{{ define "content" }}
<div class="contact-main">
	<div class="container text-center position-relative">
		<h1 class="text-white text-center fw-light">Get the latest updates from Stories</h1>
		<div class="row">
			<div class="col-md-4 offset-md-4 text-white">
        <form action="/signup" method="POST">
          <label for="name">Name:</label><br>
          <input 
            type="text" 
            name="name" 
            required
          /><br><br>
          <label for="email">Email:</label><br>
          <input 
            type="email" 
            name="email" 
            placeholder="name@email.com"
            required
          /><br><br>
          <button class="btn btn-primary btn-md" type="submit">Sign Up</button>
        </form>
      </div>
    </div>
  </div>
</div>
<div class="p-3 text-center">
  <div class="container">
      <h2>Get Simple Weekly Updates</h2>
      <p>No obligations and opt-out at any time.</p>
  </div>
</div>

{{ end }}
