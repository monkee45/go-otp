{{ define "content" }}
  <div class="container">
    <div class="row justify-content-center">
      
      <div class="col-md-5">
        <div class="text-primary fs-4 mb-3" style="--bs-text-opacity: .6">
          Step 1 of 2
        </div>

        <div class="card bg-dark shadow-lg border-0 rounded-4">
          <div class="card-body p-4">  
            <h4 class="text-white text-center mb-4">Sign In</h4>

            <form action="/signin" method="POST">

              <div class="form-floating mb-3">
                <input 
                  type="email" 
                  name="email" 
                  class="form-control" 
                  id="email"
                  placeholder="name@email.com"
                  required
                  autofocus
                >
                <label for="email">Email address</label>
              </div>
              <div class="d-flex justify-content-center">
                <button class="btn btn-primary text-bold w-50 py-2" type="submit">
                Proceed to Step 2
                </button>  
              </div>
              </form>  
          </div>
        </div>

        <p class="text-center mt-3 text-muted">
          Login will use a One-Time Password
        </p>
      </div>
    </div>
  </div>
{{ end }}
