{{ define "base" }}
<!DOCTYPE html>
<html lang="en">

  {{ template "header" . }}

  <body class="container-fluid d-flex flex-column min-vh-100">

    {{ template "navbar" . }}
    {{ if .Alert }}
      {{template "alert" .Alert}} 
    {{end}}
    <main class="flex-grow-1 align-items-center justify-content-center">
      
      {{ block "content" . }} {{ end }}
    </main>

    {{ template "footer" . }}

  </body>
</html>
{{ end }}
